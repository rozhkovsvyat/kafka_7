# MirrorMaker 2: зеркалирование YC Kafka → локальный Docker Kafka
# Переменные подставляются через envsubst при старте контейнера

clusters = yc, local

# Connect-воркер хранит служебные топики (offsets/configs/status) на локальном
# кластере — YC Kafka запрещает создание топиков через Kafka Admin API
bootstrap.servers = kafka-local:9092

# ── Исходный кластер (YC Kafka) ────────────────────────────
yc.bootstrap.servers = ${BOOTSTRAP_SERVER}
yc.security.protocol = SASL_SSL
yc.sasl.mechanism = SCRAM-SHA-512
yc.sasl.jaas.config = org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USER_MIRROR}" password="${KAFKA_PASS_APP}";
yc.ssl.truststore.location = /kafka-certs/client.truststore.jks
yc.ssl.truststore.password = ${STORE_PASS}
yc.consumer.group.id = mirrormaker-yc

# ── Целевой кластер (локальный Docker) ─────────────────────
local.bootstrap.servers = kafka-local:9092

# ── Поток репликации ───────────────────────────────────────
yc->local.enabled = true
yc->local.topics = shop-products, client-queries
yc->local.replication.factor = 1
# Offset-syncs хранить на TARGET (local) — там auto-create и нет ACL
yc->local.offset-syncs.topic.location = target

# Сохраняем оригинальные имена топиков без префикса "yc."
replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy

# ── Служебные топики Connect-воркера (на локальном кластере) ──
# Явные имена, чтобы MM2 не пытался создавать их на YC Kafka
config.storage.topic = mm2-configs.local.internal
offset.storage.topic = mm2-offsets.local.internal
status.storage.topic = mm2-status.local.internal
# RF=1: локальный кластер одноброкерный
config.storage.replication.factor = 1
offset.storage.replication.factor = 1
status.storage.replication.factor = 1

# ── Служебные топики репликации ────────────────────────────
offset-syncs.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
checkpoints.topic.replication.factor = 1
tasks.max = 1
