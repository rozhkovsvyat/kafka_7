spring:
  application:
    name: client-api
  kafka:
    bootstrap-servers: ${BOOTSTRAP_SERVER}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        max.in.flight.requests.per.connection: 1
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-512
      sasl.jaas.config: >-
        org.apache.kafka.common.security.scram.ScramLoginModule required
        username="${KAFKA_USER}"
        password="${KAFKA_PASS}";
      ssl.truststore.location: ${CERT_DIR}/client.truststore.jks
      ssl.truststore.password: ${STORE_PASS}

client:
  topic: ${TOPIC_CLIENT_QUERIES:client-queries}
  recommendations:
    topic: ${TOPIC_RECOMMENDATIONS:recommendations}
    poll-seconds: 5
  storage:
    file: ${CLIENT_STORAGE_FILE:data/client-queries.jsonl}
  products:
    file: ${SHOP_PRODUCTS_FILE:data/products.json}

logging:
  level:
    com.marketplace: INFO
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
